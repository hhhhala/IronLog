name = "ironlog-worker"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "ironlog-db"
database_id = "ironlog-db-id"

[vars]
DEEPSEEK_API_KEY = ""
DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions"

[env.production]
[[d1_databases]]
binding = "DB"
database_name = "ironlog-db"
database_id = ""  # Set after `wrangler d1 create ironlog-db`

[env.production.vars]
DEEPSEEK_API_KEY = ""
DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions"
